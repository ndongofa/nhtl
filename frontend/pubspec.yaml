name: sama
description: "Application Flutter pour transport et commandes en ligne"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  font_awesome_flutter: ^11.0.0
  intl: ^0.20.2
  intl_phone_field: ^3.2.0
  http: ^1.1.0
  fluttertoast: ^9.0.0
  logger: ^2.0.1
  shared_preferences: ^2.2.0
  provider: ^6.1.2
  go_router: ^17.1.0
  flutter_screenutil: ^5.8.0
  supabase_flutter: ^2.12.0
  flutter_svg: ^2.0.10
  url_launcher: ^6.3.0
  # ✅ Suivi postal — upload photos + affichage
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  youtube_player_iframe: ^5.1.1
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/flyer1.png
    - assets/flyer2.png
    - assets/flyer3.png
    - assets/flyer4.png
    - assets/flyer5.png
    - assets/flyer6.png
    - assets/flyer7.png
    - assets/flyer8.png
    - assets/flyer9.png
    - assets/flyer10.png