server.port=${PORT:8080}
server.servlet.context-path=/

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.pool-prepared-statements=false
spring.datasource.hikari.prepStmtCacheSize=0
spring.datasource.hikari.prepStmtCacheSqlLimit=0
spring.datasource.hikari.data-source-properties.cachePrepStmts=false
spring.datasource.hikari.data-source-properties.useServerPrepStmts=false
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

supabase.jwt.secret=${SUPABASE_JWT_SECRET}
supabase.project.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}

app.mail.from=${MAIL_FROM:tech@ngom-holding.com}
app.mail.fromName=${MAIL_FROMNAME:SAMA Services International}
brevo.apiKey=${BREVO_API_KEY:}

spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

twilio.accountSid=${TWILIO_ACCOUNT_SID:}
twilio.authToken=${TWILIO_AUTH_TOKEN:}
twilio.fromNumber=${TWILIO_FROM_NUMBER:}
twilio.whatsapp.fromNumber=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

logging.level.root=WARN
logging.level.com.nhtl=ERROR
logging.level.com.nhtl.notifications=INFO
logging.level.com.nhtl.notifications.providers=INFO
logging.level.org.springframework.mail=INFO
logging.level.org.springframework=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework.core.env=WARN