# =========================
# Application
# =========================
spring.application.name=nhtl-backend
server.port=${PORT:8080}
server.servlet.context-path=/

# =========================
# Datasource
# =========================
supabase.service.role.key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.project.url=${SUPABASE_URL}
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# Hikari + postgresql: d�sactive ABSOLUMENT les caches de prepared statements (PgBouncer, Railway, Heroku, Supabase)
spring.datasource.hikari.pool-prepared-statements=false
spring.datasource.hikari.prepStmtCacheSize=0
spring.datasource.hikari.prepStmtCacheSqlLimit=0
spring.datasource.hikari.data-source-properties.cachePrepStmts=false
spring.datasource.hikari.data-source-properties.useServerPrepStmts=false

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# Le dialecte PostgreSQL est d�tect� automatiquement, pas besoin de d�finir (ne pas d�commenter)
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# Jackson
# =========================
spring.jackson.time-zone=Africa/Kinshasa
spring.jackson.locale=fr_FR

# =========================
# Supabase
# =========================
supabase.project.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}
supabase.jwt.secret=${SUPABASE_JWT_SECRET}

# =========================
# Logging
# =========================
logging.level.root=WARN
logging.level.com.nhtl=ERROR
logging.level.org.springframework=ERROR
logging.level.org.hibernate.SQL=ERROR